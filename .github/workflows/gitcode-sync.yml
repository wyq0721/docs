name: GitCode Sync

on:
  workflow_dispatch:
    inputs:
      gitcode_repo:
        description: 'GitCode 仓库路径，例如 org/repo-name 或 username/repo-name'
        required: true
        type: string
      target_dir:
        description: '同步到本仓库的目标目录（相对路径），留空则默认为 synced/<仓库名>'
        required: false
        default: ''
        type: string
      branch:
        description: '要同步的分支'
        required: false
        default: 'main'
        type: string
  push:
    paths:
      - '.github/gitcode-sync-request.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve sync request
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REPO="${{ inputs.gitcode_repo }}"
            BRANCH="${{ inputs.branch }}"
            TARGET_DIR="${{ inputs.target_dir }}"
          else
            REQUEST_FILE=".github/gitcode-sync-request.json"

            if [ ! -f "$REQUEST_FILE" ]; then
              echo "No sync request file found."
              exit 1
            fi

            REPO="$(python3 -c 'import json; print(json.load(open(".github/gitcode-sync-request.json", encoding="utf-8")).get("gitcode_repo", ""))')"
            BRANCH="$(python3 -c 'import json; print(json.load(open(".github/gitcode-sync-request.json", encoding="utf-8")).get("branch", ""))')"
            TARGET_DIR="$(python3 -c 'import json; print(json.load(open(".github/gitcode-sync-request.json", encoding="utf-8")).get("target_dir", ""))')"
          fi

          case "$REPO" in
            */*) ;;
            *)
              echo "Invalid gitcode_repo: $REPO"
              exit 1
              ;;
          esac

          if [ -z "$TARGET_DIR" ]; then
            TARGET_DIR="synced/$(basename "$REPO")"
          fi

          case "/$TARGET_DIR/" in
            //*) 
              echo "Invalid target_dir: $TARGET_DIR"
              exit 1
              ;;
            */../*|*/./*)
              echo "Invalid target_dir: $TARGET_DIR"
              exit 1
              ;;
          esac

          if [ -z "$BRANCH" ]; then
            BRANCH="main"
          fi

          echo "GITCODE_REPO=${REPO}" >> "$GITHUB_ENV"
          echo "GITCODE_BRANCH=${BRANCH}" >> "$GITHUB_ENV"
          echo "TARGET_DIR=${TARGET_DIR}" >> "$GITHUB_ENV"
          echo "Syncing gitcode.com/${REPO}@${BRANCH} -> ${TARGET_DIR}"

      - name: Clone from GitCode via HTTPS
        env:
          GITCODE_USER: ${{ secrets.GITCODE_USER }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          git clone --depth 1 --branch "$GITCODE_BRANCH" \
            "https://${GITCODE_USER}:${GITCODE_TOKEN}@gitcode.com/${GITCODE_REPO}.git" \
            /tmp/gitcode-clone

          rm -rf /tmp/gitcode-clone/.git

          mkdir -p "$TARGET_DIR"
          rsync -av --delete /tmp/gitcode-clone/ "$TARGET_DIR/"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$TARGET_DIR"

          if git diff --staged --quiet; then
            echo "No changes to commit — already up to date."
          else
            git commit -m "chore: sync ${GITCODE_REPO}@${GITCODE_BRANCH} from GitCode"
            git push
          fi
